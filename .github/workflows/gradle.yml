name: Whispy CI/CD 워크플로우

on:
  push:
    branches:
      - main
      - develop

permissions:
  contents: read

concurrency:
  group: deploy-${{ github.ref_name }}
  cancel-in-progress: true

jobs:
  ci:
    runs-on: ubuntu-latest

    outputs:
      sha_short: ${{ steps.vars.outputs.sha_short }}
      image_name: ${{ steps.image.outputs.image_name }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Gradle Caching
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      - name: Get Git SHA
        id: vars
        run: echo "sha_short=$(git rev-parse --short HEAD)" >> "$GITHUB_OUTPUT"

      - name: Decide image name
        id: image
        run: |
          if [ "${{ github.ref_name }}" = "main" ]; then
            echo "image_name=whispy_be_prod" >> "$GITHUB_OUTPUT"
          else
            echo "image_name=whispy_be_stag" >> "$GITHUB_OUTPUT"
          fi

      - name: Grant execute permission for gradlew
        run: chmod +x ./gradlew

      - name: Make application.yml
        run: |
          mkdir -p ./src/main/resources
          if [ "${{ github.ref_name }}" = "main" ]; then
            echo "${{ secrets.YML_PROD }}" > ./src/main/resources/application.yml
          else
            echo "${{ secrets.YML_STAG }}" > ./src/main/resources/application.yml
          fi

      - name: Build with Gradle
        run: ./gradlew clean build -x test

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Docker build & push
        run: |
          docker build -f Dockerfile \
            -t ${{ secrets.DOCKER_REPO }}/${{ steps.image.outputs.image_name }}:${{ steps.vars.outputs.sha_short }} \
            -t ${{ secrets.DOCKER_REPO }}/${{ steps.image.outputs.image_name }}:latest \
            .

          docker push ${{ secrets.DOCKER_REPO }}/${{ steps.image.outputs.image_name }}:${{ steps.vars.outputs.sha_short }}
          docker push ${{ secrets.DOCKER_REPO }}/${{ steps.image.outputs.image_name }}:latest

  deploy-prod:
    needs: ci
    if: github.ref_name == 'main'
    runs-on: ubuntu-latest

    steps:
      - name: Deploy to PROD EC2
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.PROD_EC2_HOST }}
          username: ${{ secrets.PROD_EC2_USER }}
          key: ${{ secrets.PROD_EC2_SSH_KEY }}
          port: ${{ secrets.PROD_EC2_PORT }}
          script: |
            set -e

            SERVICE_NAME=whispy-springboot

            echo "${{ secrets.DOCKER_PASSWORD }}" | docker login -u "${{ secrets.DOCKER_USERNAME }}" --password-stdin

            docker service update \
              --image ${{ secrets.DOCKER_REPO }}/${{ needs.ci.outputs.image_name }}:${{ needs.ci.outputs.sha_short }} \
              --with-registry-auth \
              --detach=false \
              "$SERVICE_NAME"

            for i in $(seq 1 12); do
              STATUS=$(docker service ps "$SERVICE_NAME" --filter "desired-state=running" --format "{{.CurrentState}}" | head -1)
              if echo "$STATUS" | grep -q "Running"; then
                echo "Service is running"
                break
              fi
              if [ "$i" -eq 12 ]; then
                echo "Service failed to start"
                exit 1
              fi
              sleep 5
            done

            cleanup_stopped_service_containers() {
              CONTAINERS=$(
                for STATUS in exited created dead; do
                  docker ps -aq \
                    --filter "label=com.docker.swarm.service.name=${SERVICE_NAME}" \
                    --filter "status=${STATUS}"
                done | sort -u
              )

              if [ -n "$CONTAINERS" ]; then
                echo "Removing stopped whispy-springboot containers:"
                echo "$CONTAINERS"
                if ! echo "$CONTAINERS" | xargs docker rm; then
                  echo "Some stopped whispy-springboot containers could not be removed"
                fi
              else
                echo "No stopped whispy-springboot containers to remove"
              fi
            }

            wait_for_service_containers_to_settle() {
              REPLICAS=$(docker service inspect "$SERVICE_NAME" --format "{{if .Spec.Mode.Replicated}}{{.Spec.Mode.Replicated.Replicas}}{{else}}1{{end}}")

              for i in $(seq 1 24); do
                cleanup_stopped_service_containers

                TOTAL=$(docker ps -aq --filter "label=com.docker.swarm.service.name=${SERVICE_NAME}" | wc -l | tr -d ' ')
                RUNNING=$(docker ps -q --filter "label=com.docker.swarm.service.name=${SERVICE_NAME}" --filter "status=running" | wc -l | tr -d ' ')

                if [ "$TOTAL" -le "$REPLICAS" ] && [ "$RUNNING" -eq "$REPLICAS" ]; then
                  echo "Service containers settled: running=${RUNNING}, total=${TOTAL}, replicas=${REPLICAS}"
                  return 0
                fi

                echo "Waiting for old service containers to stop/remove: running=${RUNNING}, total=${TOTAL}, replicas=${REPLICAS}"
                docker ps -a --filter "label=com.docker.swarm.service.name=${SERVICE_NAME}"
                sleep 5
              done

              echo "Service containers did not settle after cleanup retries"
              docker ps -a --filter "label=com.docker.swarm.service.name=${SERVICE_NAME}"
              exit 1
            }

            wait_for_service_containers_to_settle
            docker container prune -f --filter "label=com.docker.swarm.service.name=${SERVICE_NAME}"
            docker image prune -f

  deploy-stag:
    needs: ci
    if: github.ref_name == 'develop'
    runs-on: ubuntu-latest

    steps:
      - name: Deploy to STAG Home Server
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.HOME_HOST }}
          username: ${{ secrets.HOME_USER }}
          password: ${{ secrets.HOME_PASSWORD }}
          key: ${{ secrets.HOME_SSH_KEY }}
          port: 2223
          script: |
            set -e

            SERVICE_NAME=whispy-springboot

            echo "${{ secrets.DOCKER_PASSWORD }}" | docker login -u "${{ secrets.DOCKER_USERNAME }}" --password-stdin

            docker service update \
              --image ${{ secrets.DOCKER_REPO }}/${{ needs.ci.outputs.image_name }}:${{ needs.ci.outputs.sha_short }} \
              --with-registry-auth \
              --detach=false \
              "$SERVICE_NAME"

            for i in $(seq 1 12); do
              STATUS=$(docker service ps "$SERVICE_NAME" --filter "desired-state=running" --format "{{.CurrentState}}" | head -1)
              if echo "$STATUS" | grep -q "Running"; then
                echo "Service is running"
                break
              fi
              if [ "$i" -eq 12 ]; then
                echo "Service failed to start"
                exit 1
              fi
              sleep 5
            done

            cleanup_stopped_service_containers() {
              CONTAINERS=$(
                for STATUS in exited created dead; do
                  docker ps -aq \
                    --filter "label=com.docker.swarm.service.name=${SERVICE_NAME}" \
                    --filter "status=${STATUS}"
                done | sort -u
              )

              if [ -n "$CONTAINERS" ]; then
                echo "Removing stopped whispy-springboot containers:"
                echo "$CONTAINERS"
                if ! echo "$CONTAINERS" | xargs docker rm; then
                  echo "Some stopped whispy-springboot containers could not be removed"
                fi
              else
                echo "No stopped whispy-springboot containers to remove"
              fi
            }

            wait_for_service_containers_to_settle() {
              REPLICAS=$(docker service inspect "$SERVICE_NAME" --format "{{if .Spec.Mode.Replicated}}{{.Spec.Mode.Replicated.Replicas}}{{else}}1{{end}}")

              for i in $(seq 1 24); do
                cleanup_stopped_service_containers

                TOTAL=$(docker ps -aq --filter "label=com.docker.swarm.service.name=${SERVICE_NAME}" | wc -l | tr -d ' ')
                RUNNING=$(docker ps -q --filter "label=com.docker.swarm.service.name=${SERVICE_NAME}" --filter "status=running" | wc -l | tr -d ' ')

                if [ "$TOTAL" -le "$REPLICAS" ] && [ "$RUNNING" -eq "$REPLICAS" ]; then
                  echo "Service containers settled: running=${RUNNING}, total=${TOTAL}, replicas=${REPLICAS}"
                  return 0
                fi

                echo "Waiting for old service containers to stop/remove: running=${RUNNING}, total=${TOTAL}, replicas=${REPLICAS}"
                docker ps -a --filter "label=com.docker.swarm.service.name=${SERVICE_NAME}"
                sleep 5
              done

              echo "Service containers did not settle after cleanup retries"
              docker ps -a --filter "label=com.docker.swarm.service.name=${SERVICE_NAME}"
              exit 1
            }

            wait_for_service_containers_to_settle
            docker container prune -f --filter "label=com.docker.swarm.service.name=${SERVICE_NAME}"
            docker image prune -f

  notify-prod:
    needs:
      - ci
      - deploy-prod
    if: always() && github.ref_name == 'main'
    runs-on: ubuntu-latest

    steps:
      - name: Discord Notification for PROD
        run: |
          if [ "${{ needs.ci.result }}" = "success" ] && [ "${{ needs.deploy-prod.result }}" = "success" ]; then
            COLOR=3066993
            STATUS="✅ PROD 배포 완료"
          else
            COLOR=15158332
            STATUS="❌ PROD 배포 실패"
          fi

          curl -H "Content-Type: application/json" \
               -d "{
                 \"embeds\": [{
                   \"title\": \"${STATUS}\",
                   \"description\": \"Commit: \`${{ needs.ci.outputs.sha_short }}\`\n브랜치: \`${{ github.ref_name }}\`\n이미지: \`${{ needs.ci.outputs.image_name }}\`\",
                   \"color\": ${COLOR},
                   \"timestamp\": \"$(date -u +%Y-%m-%dT%H:%M:%S.000Z)\"
                 }]
               }" \
               "${{ secrets.DISCORD_WEBHOOK_URL_PROD }}"

  notify-stag:
    needs:
      - ci
      - deploy-stag
    if: always() && github.ref_name == 'develop'
    runs-on: ubuntu-latest

    steps:
      - name: Discord Notification for STAG
        run: |
          if [ "${{ needs.ci.result }}" = "success" ] && [ "${{ needs.deploy-stag.result }}" = "success" ]; then
            COLOR=3066993
            STATUS="✅ STAG 배포 완료"
          else
            COLOR=15158332
            STATUS="❌ STAG 배포 실패"
          fi

          curl -H "Content-Type: application/json" \
               -d "{
                 \"embeds\": [{
                   \"title\": \"${STATUS}\",
                   \"description\": \"Commit: \`${{ needs.ci.outputs.sha_short }}\`\n브랜치: \`${{ github.ref_name }}\`\n이미지: \`${{ needs.ci.outputs.image_name }}\`\",
                   \"color\": ${COLOR},
                   \"timestamp\": \"$(date -u +%Y-%m-%dT%H:%M:%S.000Z)\"
                 }]
               }" \
               "${{ secrets.DISCORD_WEBHOOK_URL_STAG }}"
